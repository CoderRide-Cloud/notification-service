server:
  port: 8087

spring:
  application:
    name: notification-service
  datasource:
    url: jdbc:postgresql://localhost:5432/coder_ride_notification
    username: coderride
    password: password
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
      show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: notification-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.codingclub.common.event"

coderride:
  notifications:
    app-url: ${CODERRIDE_NOTIFICATIONS_APPURL:http://localhost:3000}
    email:
      from: ${CODERRIDE_NOTIFICATIONS_EMAIL_FROM:notifications@coderride.com}
      admin: ${CODERRIDE_NOTIFICATIONS_EMAIL_ADMIN:admin@coderride.com}
      resend-api-key: ${CODERRIDE_NOTIFICATIONS_EMAIL_RESENDAPIKEY:}
    discord:
      new-users: ${CODERRIDE_NOTIFICATIONS_DISCORD_NEWUSERS:}
      approvals: ${CODERRIDE_NOTIFICATIONS_DISCORD_APPROVALS:}
      rejections: ${CODERRIDE_NOTIFICATIONS_DISCORD_REJECTIONS:}
      new-projects: ${CODERRIDE_NOTIFICATIONS_DISCORD_NEWPROJECTS:}
      project-approvals: ${CODERRIDE_NOTIFICATIONS_DISCORD_PROJECTAPPROVALS:}
      project-rejections: ${CODERRIDE_NOTIFICATIONS_DISCORD_PROJECTREJECTIONS:}

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/

